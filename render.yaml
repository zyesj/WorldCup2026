services:
  - type: web
    name: worldcup2026
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONDONTWRITEBYTECODE=1 python3 backend_server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGIN
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
      - key: DB_PATH
        value: data/worldcup.db
      - key: LIVE_DATA_PROVIDER
        value: football-data
      - key: FOOTBALL_DATA_COMPETITION
        value: WC
      - key: FOOTBALL_DATA_TOKEN
        sync: false
      - key: LIVE_CACHE_SECONDS
        value: "60"
